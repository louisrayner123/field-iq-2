<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldIQ – Video Library</title>
<link rel="stylesheet" href="/static/shared.css">
<style>
  .video-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.25rem; }
  @media(max-width:900px){.video-grid{grid-template-columns:1fr;}}

  .video-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; cursor: pointer; transition: all 0.2s;
  }
  .video-card:hover { border-color: var(--green-mid); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

  .video-thumb {
    width: 100%; aspect-ratio: 16/9; background: var(--text);
    display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
  }
  .video-thumb svg { width: 100%; height: 100%; }
  .play-btn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 3rem; height: 3rem; border-radius: 50%;
    background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    border: 2px solid rgba(255,255,255,0.3); transition: background 0.2s;
  }
  .video-card:hover .play-btn { background: rgba(34,160,90,0.8); border-color: transparent; }

  .result-badge {
    position: absolute; top: 0.65rem; left: 0.65rem;
    padding: 0.2rem 0.55rem; border-radius: 4px; font-size: 0.65rem; font-weight: 700; font-family: var(--mono);
  }
  .rb-win { background: var(--green); color: #fff; }
  .rb-loss { background: var(--red); color: #fff; }
  .rb-draw { background: var(--amber); color: #fff; }

  .score-badge {
    position: absolute; top: 0.65rem; right: 0.65rem;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    padding: 0.2rem 0.55rem; border-radius: 4px; font-size: 0.68rem; color: #fff; font-family: var(--mono);
  }

  .video-info { padding: 1rem; }
  .vi-opp { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; }
  .vi-meta { font-size: 0.72rem; color: var(--text3); margin-bottom: 0.65rem; }
  .vi-stats { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .vi-stat { font-size: 0.7rem; font-family: var(--mono); color: var(--text2); }

  .filter-bar { display: flex; gap: 0.65rem; flex-wrap: wrap; }
  .filter-btn { padding: 0.4rem 0.85rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; font-family: var(--sans); cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text2); transition: all 0.15s; }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
  .filter-btn:hover:not(.active) { border-color: var(--text); color: var(--text); }
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">🏉</div>
    <div><div class="logo-name">FieldIQ</div><span class="logo-tag">Rugby Performance AI</span></div>
  </div>
  <nav class="nav-section">
    <div class="nav-label">Platform</div>
    <a href="/" class="nav-item"><span class="ico">🏟️</span> Team Overview</a>
    <a href="/profile.html" class="nav-item"><span class="ico">👤</span> Player Profile</a>
    <a href="/analysis.html" class="nav-item"><span class="ico">🎬</span> Analysis Room</a>
    <a href="/library.html" class="nav-item active"><span class="ico">📁</span> Video Library</a>
    <a href="/leaderboard.html" class="nav-item"><span class="ico">🏆</span> Leaderboard</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="player-pill">
      <div class="player-av av-1">JD</div>
      <div><div class="player-pname">Jamie Davies</div><div class="player-ppos">Flanker · #7</div></div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="page-title">Video Library</div>
      <div class="page-sub">All analysed match footage</div>
    </div>
    <div class="topbar-right">
      <span class="chip chip-grey" id="matchCount">0 matches</span>
      <a href="/analysis.html" class="btn btn-dark btn-sm">+ Upload Video</a>
    </div>
  </div>

  <div class="content">

    <div class="card fade-up" style="padding:1rem 1.4rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div class="filter-bar" id="filterBar">
          <button class="filter-btn active" onclick="setFilter('all',this)">All Matches</button>
          <button class="filter-btn" onclick="setFilter('win',this)">Wins</button>
          <button class="filter-btn" onclick="setFilter('loss',this)">Losses</button>
        </div>
        <div style="display:flex;gap:0.5rem;">
          <input type="text" id="searchInput" placeholder="Search opposition…" oninput="renderGallery()" style="padding:0.45rem 0.85rem;border:1px solid var(--border);border-radius:7px;font-family:var(--sans);font-size:0.82rem;outline:none;width:200px;">
        </div>
      </div>
    </div>

    <div class="video-grid fade-up-2" id="videoGrid"></div>

    <div class="empty" id="emptyState" style="display:none;">
      <div class="ei">🎬</div>
      <p>No matches found. <a href="/analysis.html" style="color:var(--green);">Upload your first video →</a></p>
    </div>

  </div>
</main>
</div>

<script src="/static/shared.js"></script>
<script>
const players = FieldIQ.getPlayers();
let allMatches = FieldIQ.getMatches();
let currentFilter = 'all';

// Enrich with dummy data
const extraMatches = [
  { id:101, playerId:3, opposition:'Northampton Saints', date:'2026-02-22', competition:'National League 1', result:'win', score:'35–14', stats:{ tackles:9,tackleAttempts:11,metersCarried:58,metersPostContact:24,offloads:3,passes:12,kickingMeters:0,carries:11,performanceScore:81 } },
  { id:102, playerId:2, opposition:'Wasps RFC', date:'2026-02-08', competition:'Friendly', result:'loss', score:'18–27', stats:{ tackles:4,tackleAttempts:5,metersCarried:22,metersPostContact:8,offloads:1,passes:38,kickingMeters:60,carries:9,performanceScore:65 } },
  { id:103, playerId:5, opposition:'Bristol Bears', date:'2026-01-25', competition:'National League 1', result:'win', score:'21–10', stats:{ tackles:12,tackleAttempts:14,metersCarried:18,metersPostContact:9,offloads:1,passes:8,kickingMeters:0,carries:6,performanceScore:76 } },
];
allMatches = [...allMatches, ...extraMatches];

document.getElementById('matchCount').textContent = allMatches.length + ' matches';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function bgForMatch(m) {
  const palettes = [
    ['#1a2a36','#0d1a22'],['#2a1a36','#1a0d22'],['#1a361a','#0d221a'],
    ['#36361a','#22220d'],['#361a1a','#220d0d'],['#1a2236','#0d1522'],
  ];
  const p = palettes[m.id % palettes.length];
  return `background:linear-gradient(135deg,${p[0]} 0%,${p[1]} 100%);`;
}

function renderGallery() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allMatches.filter(m => {
    if (currentFilter !== 'all' && m.result !== currentFilter) return false;
    if (search && !m.opposition.toLowerCase().includes(search)) return false;
    return true;
  }).sort((a,b) => new Date(b.date) - new Date(a.date));

  const grid = document.getElementById('videoGrid');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(m => {
    const p = players.find(pl => pl.id === m.playerId);
    const rb = m.result === 'win' ? 'rb-win' : m.result === 'loss' ? 'rb-loss' : 'rb-draw';
    const rl = m.result === 'win' ? 'W' : m.result === 'loss' ? 'L' : 'D';
    const sc = m.stats.performanceScore;
    const scoreChip = sc >= 75 ? 'chip-green' : sc >= 55 ? 'chip-amber' : 'chip-red';
    return `
    <div class="video-card" onclick="goToAnalysis()">
      <div class="video-thumb" style="${bgForMatch(m)}">
        <svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="180" fill="transparent"/>
          <line x1="0" y1="90" x2="320" y2="90" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
          <line x1="0" y1="45" x2="320" y2="45" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
          <line x1="0" y1="135" x2="320" y2="135" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
          <line x1="160" y1="0" x2="160" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
          <text x="160" y="140" text-anchor="middle" font-family="DM Mono,monospace" font-size="52" fill="rgba(255,255,255,0.04)" letter-spacing="2">RUGBY</text>
          <text x="160" y="76" text-anchor="middle" font-family="DM Mono,monospace" font-size="13" fill="rgba(255,255,255,0.55)">${m.score}</text>
          <text x="160" y="96" text-anchor="middle" font-family="DM Mono,monospace" font-size="9" fill="rgba(255,255,255,0.25)">${m.date}</text>
        </svg>
        <div class="play-btn">▶</div>
        <div class="result-badge ${rb}">${rl}</div>
        <div class="score-badge">${sc}/100</div>
      </div>
      <div class="video-info">
        <div class="vi-opp">vs ${m.opposition}</div>
        <div class="vi-meta">${m.competition} · ${m.date}${p ? ' · '+p.firstName+' '+p.lastName : ''}</div>
        <div class="vi-stats">
          <span class="vi-stat">🛡️ ${m.stats.tackles} tackles</span>
          <span class="vi-stat">🏃 ${m.stats.metersCarried}m</span>
          <span class="vi-stat">🏉 ${m.stats.passes} passes</span>
          <span class="chip ${scoreChip}" style="font-size:0.65rem;">${sc}/100</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function goToAnalysis() {
  window.location.href = 'analysis.html';
}

renderGallery();
</script>
</body>
</html>
